<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Karthik Sridatta — Portfolio</title>
  <style>
    :root{--bg:#0f1020;--card:#0f1724;--accent:#7c5cff;--muted:#9aa4b2;color-scheme:dark}
    html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:linear-gradient(180deg,#071022 0%,#0f1020 100%);color:#e6eef8}
    .container{max-width:980px;margin:48px auto;padding:24px}
    header{display:flex;align-items:center;justify-content:space-between}
    h1{margin:0;font-size:1.6rem;letter-spacing:0.3px}
    nav a{color:var(--accent);text-decoration:none;margin-left:16px}
    .hero{background:rgba(255,255,255,0.02);padding:24px;border-radius:12px;margin-top:20px}
    .btn{display:inline-block;background:var(--accent);color:white;padding:10px 14px;border-radius:8px;text-decoration:none;font-weight:600}
    footer{margin-top:28px;color:var(--muted);font-size:0.9rem}
    @media (max-width:520px){.container{margin:20px;padding:16px}h1{font-size:1.2rem}}
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Karthik Sridatta</h1>
      <nav>
        <a href="/resume.html">Resume</a>
        <a href="/">Home</a>
      </nav>
    </header>

    <section class="hero">
      <p style="margin:0 0 12px 0">Welcome — this is a simple portfolio landing page. Use the button below to view my resume and download a PDF copy.</p>
      <a class="btn" href="/resume.html">View Resume</a>
    </section>

    <footer>
      <p>Hosted with GitHub Pages. PDF resume is included in this repository.</p>
    </footer>
  </div>
</body>
</html>
