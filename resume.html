<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Karthik Sridatta — Resume</title>
  <style>
    :root{--bg:#0f1020;--accent:#7c5cff;--muted:#9aa4b2}
    html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:linear-gradient(180deg,#071022 0%,#0f1020 100%);color:#e6eef8}
    .wrap{max-width:1000px;margin:24px auto;padding:18px}
    header{display:flex;align-items:center;justify-content:space-between}
    h1{margin:0;font-size:1.2rem}
    nav a{color:var(--accent);text-decoration:none;margin-left:12px}
    .viewer{margin-top:18px;border-radius:8px;overflow:hidden;background:#071020;height:78vh}
    .viewer iframe{width:100%;height:100%;border:0}
    .actions{margin-top:12px}
    .btn{display:inline-block;background:var(--accent);color:white;padding:10px 14px;border-radius:8px;text-decoration:none;font-weight:600}
    .muted{color:var(--muted);font-size:0.95rem;margin-left:12px}
    @media (max-width:700px){.viewer{height:62vh}}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Karthik Sridatta — Resume</h1>
      <nav>
        <a href="/">Home</a>
        <a href="#download" style="margin-left:12px">Download</a>
      </nav>
    </header>

    <div class="actions">
      <a id="download" class="btn" href="/Karthik_Sridatta_ATS_Final.pdf" target="_blank" rel="noopener noreferrer">Open PDF (new tab)</a>
      <span class="muted">If your browser cannot display PDF inline, use the button to open or download the file.</span>
    </div>

    <div class="viewer" role="region" aria-label="Resume viewer">
      <iframe src="/Karthik_Sridatta_ATS_Final.pdf"></iframe>
    </div>

    <footer style="margin-top:14px;color:var(--muted)">
      <p>PDF file: <a href="/Karthik_Sridatta_ATS_Final.pdf" style="color:var(--accent)">Karthik_Sridatta_ATS_Final.pdf</a></p>
    </footer>
  </div>
</body>
</html>
